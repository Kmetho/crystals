<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synth Kit - Crystal Instrument</title>
    <meta name="description" content="Interactive 3D crystal instrument built with Three.js. Click crystals or press 1–8 to play ethereal tones." />
    <meta property="og:title" content="Synth Kit - Crystal Instrument" />
    <meta property="og:description" content="Interactive 3D crystal instrument built with Three.js." />
    <meta property="og:type" content="website" />
    <link href="/src/style.css" rel="stylesheet" />
  </head>

  <body>
    <canvas id="bg"></canvas>

    <div class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 text-right">
      <p
        class="text-[var(--color-dark)] text-xs sm:text-sm font-bold italic mb-2 opacity-70 hidden sm:block"
      >
        click a crystal or press 1–8
      </p>
      <p
        class="text-[var(--color-dark)] text-xs font-bold italic mb-2 opacity-70 sm:hidden"
      >
        tap a crystal to play
      </p>
      <div
        class="flex flex-col sm:flex-row items-end sm:items-center justify-end gap-1 sm:gap-2 text-[var(--color-dark)] text-xs sm:text-sm font-bold italic opacity-70"
      >
        <a
          target="_blank"
          rel="noopener noreferrer"
          href="https://github.com/Kmetho/crystals"
          class="border border-[var(--color-dark)]/30 hover:border-[var(--color-dark)] hover:scale-105 py-1 px-2 rounded-full transition-all cursor-pointer inline-block"
          >source code</a
        >
        <span class="hidden sm:inline">and more cool stuff I made on</span>
        <a
          target="_blank"
          rel="noopener noreferrer"
          href="https://wercche.xyz"
          class="border border-[var(--color-dark)]/30 hover:border-[var(--color-dark)] hover:scale-105 py-1 px-2 rounded-full transition-all cursor-pointer inline-block"
          >my website</a
        >
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
